<title>خالد التميمي</title>

<style>
  :root{
    --bg-1: #0B0D12;
    --bg-2: #14171F;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.10);
    --ink: #F4F5F7;
    --ink-soft: #9AA0AC;
    --gold: #CBA35C;

    --snap: #FFFC00;
    --insta-1: #F58529;
    --insta-2: #DD2A7B;
    --insta-3: #8134AF;
    --tiktok-1: #25F4EE;
    --tiktok-2: #FE2C55;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    background: var(--bg-1);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(203,163,92,0.14) 0, transparent 42%),
      radial-gradient(circle at 85% 80%, rgba(129,52,175,0.18) 0, transparent 45%),
      radial-gradient(circle at 50% 100%, rgba(37,244,238,0.08) 0, transparent 48%),
      radial-gradient(circle at 90% 10%, rgba(221,42,123,0.10) 0, transparent 40%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 26px);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Cairo', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 18px;
    position: relative;
    overflow-x: hidden;
  }
  body::before, body::after{
    content:"";
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    z-index: 0;
    pointer-events: none;
  }
  body::before{
    width: 320px; height: 320px;
    top: -80px; right: -80px;
    background: radial-gradient(circle, rgba(203,163,92,0.20), transparent 70%);
    animation: floatSlow 9s ease-in-out infinite;
  }
  body::after{
    width: 360px; height: 360px;
    bottom: -100px; left: -100px;
    background: radial-gradient(circle, rgba(129,52,175,0.22), transparent 70%);
    animation: floatSlow 11s ease-in-out infinite reverse;
  }
  @keyframes floatSlow{
    0%, 100%{ transform: translateY(0) translateX(0); }
    50%{ transform: translateY(24px) translateX(-14px); }
  }

  .page{
    width: 100%;
    max-width: 420px;
    text-align:center;
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp .8s ease forwards;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeUp{
    to{ opacity: 1; transform: translateY(0); }
  }

  /* =========================================================
     الصورة الشخصية
     👈 لتغيير الصورة: بدّل رابط src في وسم <img id="profilePhoto">
        بالأسفل داخل قسم body، أو مرّر رابط جديد بمتغير PROFILE_PHOTO
  ========================================================== */
  .avatar-wrap{
    width: 132px;
    height: 132px;
    margin: 0 auto 22px;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, var(--gold), #8134AF, var(--tiktok-1));
    animation: glowPulse 3.5s ease-in-out infinite;
  }
  @keyframes glowPulse{
    0%, 100%{ box-shadow: 0 0 0 rgba(203,163,92,0.0); }
    50%{ box-shadow: 0 0 28px rgba(203,163,92,0.25); }
  }
  .avatar{
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--bg-2);
    border: 3px solid var(--bg-1);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
  }
  .avatar .initials{
    font-size: 42px;
    font-weight: 900;
    color: var(--gold);
  }

  /* =========================================================
     الاسم والوصف
     👈 لتغيير الاسم أو الوصف: عدّل النص داخل .name و .bio بالأسفل
  ========================================================== */
  h1.name{
    font-size: 26px;
    font-weight: 900;
    letter-spacing: .5px;
    margin-bottom: 10px;
  }
  .divider{
    width: 46px;
    height: 3px;
    margin: 0 auto 16px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  p.bio{
    font-size: 14.5px;
    color: var(--ink-soft);
    max-width: 320px;
    margin: 0 auto 34px;
    line-height: 1.8;
  }

  /* =========================================================
     الأزرار
     👈 لتغيير الروابط: عدّل قيمة href لكل <a class="link-btn">
  ========================================================== */
  .links{
    display:flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-btn{
    position:relative;
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-decoration:none;
    color: var(--ink);
    font-weight: 700;
    font-size: 16px;
    overflow:hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    transition: transform .25s ease, border-color .25s ease, background .25s ease, box-shadow .25s ease;
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp .6s ease forwards;
  }
  .link-btn:nth-child(1){ animation-delay: .15s; }
  .link-btn:nth-child(2){ animation-delay: .28s; }
  .link-btn:nth-child(3){ animation-delay: .41s; }

  .link-btn:hover{
    transform: translateY(-4px) scale(1.015);
    border-color: rgba(203,163,92,0.45);
    box-shadow: 0 14px 34px rgba(0,0,0,0.4);
  }
  .link-btn:active{ transform: translateY(-1px) scale(0.99); }

  .link-btn .icon{
    width: 46px;
    height: 46px;
    min-width: 46px;
    border-radius: 13px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  }
  .link-btn .icon img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .link-btn .label{ flex:1; text-align:right; }
  .link-btn .go{
    font-size: 13px;
    color: var(--ink-soft);
    opacity: 0;
    transform: translateX(6px);
    transition: opacity .25s ease, transform .25s ease;
  }
  .link-btn:hover .go{ opacity: 1; transform: translateX(0); }

  /* ألوان كل منصة */
  .snap .icon{ background: var(--snap); color:#111; }
  .snap:hover{ background: rgba(255,252,0,0.08); }

  .insta .icon{
    background: linear-gradient(135deg, var(--insta-1), var(--insta-2), var(--insta-3));
    color:#fff;
  }
  .insta:hover{ background: rgba(221,42,123,0.10); }

  .tiktok .icon{
    background: linear-gradient(135deg, var(--tiktok-1), var(--tiktok-2));
    color:#fff;
  }
  .tiktok:hover{ background: rgba(37,244,238,0.08); }

  footer{
    margin-top: 34px;
    font-size: 12px;
    color: var(--ink-soft);
    opacity: 0;
    animation: fadeUp .6s ease forwards;
    animation-delay: .55s;
  }

  @media (max-width:380px){
    .link-btn{ padding: 14px 16px; font-size: 15px; }
    .avatar-wrap{ width: 112px; height: 112px; }
  }
</style>
